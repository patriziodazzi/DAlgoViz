<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAlgoViz</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --accent: #e94560;
            --accent2: #0ea5e9;
            --text: #eee;
            --text-dim: #999;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--surface);
            border-bottom: 2px solid var(--accent);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }
        header h1 span { color: var(--text); font-weight: 300; }
        nav { display: flex; gap: 4px; }
        nav button {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
        }
        nav button:hover { border-color: var(--accent2); color: var(--accent2); }
        nav button.active {
            background: var(--accent2);
            border-color: var(--accent2);
            color: white;
        }
        main { padding: 24px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- Laws --- */
        .laws-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .law-card {
            background: var(--surface);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
        }
        .law-card h3 {
            color: var(--accent2);
            margin-bottom: 4px;
            font-size: 1rem;
        }
        .law-card .formula {
            font-family: 'Courier New', monospace;
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 12px;
        }
        .law-card .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .law-card label {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .law-card input[type=range] {
            width: 120px;
            accent-color: var(--accent2);
        }
        .law-card .value {
            font-family: monospace;
            color: var(--accent);
            font-size: 0.85rem;
            min-width: 40px;
        }
        .law-card canvas {
            width: 100%;
            height: 200px;
        }
        .law-card .info {
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .chart-legend {
            display: flex;
            gap: 16px;
            margin-top: 6px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-line {
            display: inline-block;
            width: 16px;
            height: 2px;
        }
        .legend-dashed {
            background: repeating-linear-gradient(90deg, #666 0, #666 4px, transparent 4px, transparent 8px) !important;
        }
        .little-layout {
            display: flex;
            gap: 16px;
            align-items: stretch;
        }
        .little-right {
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .little-equation {
            text-align: center;
            padding: 16px 12px;
            background: var(--bg);
            border-radius: 6px;
            border: 1px solid #333;
        }
        .little-equation .result {
            color: var(--accent);
            font-weight: bold;
            font-size: 2rem;
            font-family: 'Courier New', monospace;
        }
        .little-equation .label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .queue-viz {
            background: var(--bg);
            border-radius: 6px;
            border: 1px solid #333;
            padding: 12px;
            flex: 1;
        }
        .qv-title {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .queue-dots {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }
        .queue-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent2);
            opacity: 0.85;
        }
        .queue-dot.overflow {
            background: var(--danger);
        }
        .queue-summary {
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* --- Lamport --- */
        .lamport-container {
            display: flex;
            gap: 20px;
        }
        .lamport-controls {
            background: var(--surface);
            border-radius: 8px;
            padding: 16px;
            min-width: 200px;
            border: 1px solid #333;
        }
        .lamport-controls h3 {
            color: var(--accent2);
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        .lamport-controls button {
            display: block;
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: var(--surface2);
            border: 1px solid #444;
            color: var(--text);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
        }
        .lamport-controls button:hover {
            background: var(--accent2);
            border-color: var(--accent2);
        }
        .lamport-controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .process-list {
            margin-top: 12px;
            border-top: 1px solid #333;
            padding-top: 12px;
        }
        .process-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }
        .process-item .name { font-weight: 600; }
        .process-item .clock {
            font-family: monospace;
            color: var(--accent);
        }
        .process-item.crashed .name {
            color: var(--danger);
            text-decoration: line-through;
        }
        .process-item button {
            width: auto;
            display: inline;
            padding: 2px 8px;
            margin: 0;
            font-size: 0.75rem;
        }
        .lamport-diagram {
            flex: 1;
            background: var(--surface);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
            overflow-x: auto;
        }
        .lamport-diagram h3 {
            color: var(--accent2);
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        .step-info {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 8px;
        }
        canvas#lamport-canvas {
            background: var(--bg);
            border-radius: 4px;
            border: 1px solid #333;
        }

        @media (max-width: 900px) {
            .laws-grid { grid-template-columns: 1fr; }
            .lamport-container { flex-direction: column; }
            .little-layout { flex-direction: column; }
            .little-right { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>DAlgoViz <span>v0.1</span></h1>
        <nav>
            <button class="active" onclick="showTab('laws')">Scalability Laws</button>
            <button onclick="showTab('lamport')">Lamport Clocks</button>
        </nav>
    </header>
    <main>
        <!-- ==================== SCALABILITY LAWS ==================== -->
        <div id="tab-laws" class="tab-content active">
            <div class="laws-grid">
                <!-- Amdahl -->
                <div class="law-card">
                    <h3>Amdahl's Law</h3>
                    <div class="formula">S(N) = 1 / (f + (1−f)/N)</div>
                    <div class="controls">
                        <label>Serial fraction (f):
                            <input type="range" id="amdahl-f" min="0.01" max="0.99" step="0.01" value="0.1">
                            <span class="value" id="amdahl-f-val">0.10</span>
                        </label>
                        <label>Max processors:
                            <input type="range" id="amdahl-n" min="4" max="256" step="4" value="64">
                            <span class="value" id="amdahl-n-val">64</span>
                        </label>
                    </div>
                    <canvas id="amdahl-chart"></canvas>
                    <div class="info" id="amdahl-info"></div>
                </div>
                <!-- Gustafson -->
                <div class="law-card">
                    <h3>Gustafson's Law</h3>
                    <div class="formula">S(N) = N − f·(N−1)</div>
                    <div class="controls">
                        <label>Serial fraction (f):
                            <input type="range" id="gustafson-f" min="0.01" max="0.99" step="0.01" value="0.1">
                            <span class="value" id="gustafson-f-val">0.10</span>
                        </label>
                        <label>Max processors:
                            <input type="range" id="gustafson-n" min="4" max="256" step="4" value="64">
                            <span class="value" id="gustafson-n-val">64</span>
                        </label>
                    </div>
                    <canvas id="gustafson-chart"></canvas>
                    <div class="chart-legend">
                        <span class="legend-item"><span class="legend-line" style="background:#0ea5e9"></span> Gustafson</span>
                        <span class="legend-item"><span class="legend-line" style="background:#e94560"></span> Amdahl</span>
                        <span class="legend-item"><span class="legend-line legend-dashed"></span> Linear</span>
                    </div>
                    <div class="info" id="gustafson-info"></div>
                </div>
                <!-- USL -->
                <div class="law-card">
                    <h3>Universal Scalability Law</h3>
                    <div class="formula">C(N) = N / (1 + σ(N−1) + κN(N−1))</div>
                    <div class="controls">
                        <label>Contention (σ):
                            <input type="range" id="usl-sigma" min="0.001" max="0.5" step="0.001" value="0.05">
                            <span class="value" id="usl-sigma-val">0.050</span>
                        </label>
                        <label>Coherency (κ):
                            <input type="range" id="usl-kappa" min="0.0001" max="0.1" step="0.0001" value="0.01">
                            <span class="value" id="usl-kappa-val">0.0100</span>
                        </label>
                        <label>Max processors:
                            <input type="range" id="usl-n" min="4" max="256" step="4" value="64">
                            <span class="value" id="usl-n-val">64</span>
                        </label>
                    </div>
                    <canvas id="usl-chart"></canvas>
                    <div class="info" id="usl-info"></div>
                </div>
                <!-- Little's Law -->
                <div class="law-card" style="grid-column: 1 / -1;">
                    <h3>Little's Law</h3>
                    <div class="formula">L = λ · W</div>
                    <div class="controls">
                        <label>Arrival rate (λ req/s):
                            <input type="range" id="little-lambda" min="1" max="1000" step="1" value="100">
                            <span class="value" id="little-lambda-val">100</span>
                        </label>
                        <label>Avg time in system (W sec):
                            <input type="range" id="little-w" min="0.001" max="2" step="0.001" value="0.05">
                            <span class="value" id="little-w-val">0.050</span>
                        </label>
                    </div>
                    <div class="little-layout">
                        <canvas id="little-heatmap" style="flex:1; height:220px;"></canvas>
                        <div class="little-right">
                            <div class="little-equation" id="little-eq"></div>
                            <div class="queue-viz">
                                <div class="qv-title">System Queue</div>
                                <div class="queue-dots" id="queue-dots"></div>
                                <div class="queue-summary" id="queue-count"></div>
                            </div>
                        </div>
                    </div>
                    <div class="info" id="little-info"></div>
                </div>
            </div>
        </div>

        <!-- ==================== LAMPORT CLOCKS ==================== -->
        <div id="tab-lamport" class="tab-content">
            <div class="lamport-container">
                <div class="lamport-controls">
                    <h3>Controls</h3>
                    <button id="btn-step" onclick="lamportStep()">▶ Step</button>
                    <button id="btn-run" onclick="lamportRunAll()">▶▶ Run All</button>
                    <button onclick="lamportReset()">↺ Reset</button>
                    <div class="step-info" id="step-info">Step 0 / 0</div>
                    <div class="process-list" id="process-list"></div>
                </div>
                <div class="lamport-diagram">
                    <h3>Space-Time Diagram</h3>
                    <canvas id="lamport-canvas" width="700" height="400"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
    // ==================== TAB SWITCHING ====================
    function showTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => {
            if (b.textContent.toLowerCase().includes(name.substring(0, 3))) b.classList.add('active');
        });
    }

    // ==================== CHART DRAWING ====================
    function drawLineChart(canvasId, xs, ys, options = {}) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        const w = rect.width;
        const h = rect.height;
        const pad = { top: 20, right: 20, bottom: 35, left: 50 };
        const pw = w - pad.left - pad.right;
        const ph = h - pad.top - pad.bottom;

        const xMin = options.xMin ?? Math.min(...xs);
        const xMax = options.xMax ?? Math.max(...xs);
        const yMin = options.yMin ?? 0;
        const yMax = options.yMax ?? Math.max(...ys) * 1.1;

        const toX = x => pad.left + (x - xMin) / (xMax - xMin) * pw;
        const toY = y => pad.top + ph - (y - yMin) / (yMax - yMin) * ph;

        // Clear
        ctx.clearRect(0, 0, w, h);

        // Grid
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= 4; i++) {
            const y = pad.top + (ph / 4) * i;
            ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
        }

        // Linear reference (if requested)
        if (options.showLinear) {
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(toX(xMin), toY(xMin));
            ctx.lineTo(toX(xMax), toY(Math.min(xMax, yMax)));
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Horizontal reference line
        if (options.hLine !== undefined) {
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            const hy = toY(options.hLine);
            ctx.moveTo(pad.left, hy);
            ctx.lineTo(w - pad.right, hy);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#e94560';
            ctx.font = '10px monospace';
            ctx.fillText(options.hLineLabel || options.hLine.toFixed(1), w - pad.right - 40, hy - 4);
        }

        // Peak marker
        if (options.peakX !== undefined && options.peakY !== undefined) {
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(toX(options.peakX), toY(options.peakY), 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#e94560';
            ctx.font = '10px monospace';
            ctx.fillText(`peak: N=${options.peakX}`, toX(options.peakX) + 8, toY(options.peakY) - 4);
        }

        // Data line
        ctx.strokeStyle = options.color || '#0ea5e9';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < xs.length; i++) {
            const x = toX(xs[i]);
            const y = toY(ys[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Axes labels
        ctx.fillStyle = '#999';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(options.xLabel || 'Processors (N)', w / 2, h - 4);
        ctx.save();
        ctx.translate(12, h / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText(options.yLabel || 'Speedup', 0, 0);
        ctx.restore();

        // Tick labels
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        for (let i = 0; i <= 4; i++) {
            const xv = xMin + (xMax - xMin) / 4 * i;
            ctx.fillText(Math.round(xv), toX(xv), h - pad.bottom + 14);
        }
        ctx.textAlign = 'right';
        for (let i = 0; i <= 4; i++) {
            const yv = yMin + (yMax - yMin) / 4 * i;
            ctx.fillText(yv.toFixed(1), pad.left - 6, toY(yv) + 3);
        }
    }

    // ==================== COMPARISON CHART ====================
    function drawComparisonChart(canvasId, xs, series, options = {}) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        const w = rect.width, h = rect.height;
        const pad = { top: 20, right: 20, bottom: 35, left: 50 };
        const pw = w - pad.left - pad.right;
        const ph = h - pad.top - pad.bottom;
        const xMin = Math.min(...xs), xMax = Math.max(...xs);
        const yMin = 0;
        let yMax = 0;
        for (const s of series) { const m = Math.max(...s.values); if (m > yMax) yMax = m; }
        yMax *= 1.15;
        const toX = x => pad.left + (x - xMin) / (xMax - xMin) * pw;
        const toY = y => pad.top + ph - (y - yMin) / (yMax - yMin) * ph;
        ctx.clearRect(0, 0, w, h);
        // Grid
        ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5;
        for (let i = 0; i <= 4; i++) {
            const y = pad.top + (ph / 4) * i;
            ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
        }
        // Linear reference
        if (options.showLinear) {
            ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(toX(xMin), toY(xMin));
            ctx.lineTo(toX(xMax), toY(Math.min(xMax, yMax)));
            ctx.stroke(); ctx.setLineDash([]);
        }
        // Fill gap between series
        if (series.length === 2) {
            ctx.fillStyle = 'rgba(14, 165, 233, 0.08)';
            ctx.beginPath();
            for (let i = 0; i < xs.length; i++) {
                const x = toX(xs[i]), y = toY(series[0].values[i]);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            for (let i = xs.length - 1; i >= 0; i--) {
                ctx.lineTo(toX(xs[i]), toY(series[1].values[i]));
            }
            ctx.closePath();
            ctx.fill();
        }
        // Series lines
        for (const s of series) {
            ctx.strokeStyle = s.color; ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < xs.length; i++) {
                const x = toX(xs[i]), y = toY(s.values[i]);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        // Axes labels
        ctx.fillStyle = '#999'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(options.xLabel || 'Processors (N)', w / 2, h - 4);
        ctx.save(); ctx.translate(12, h / 2); ctx.rotate(-Math.PI / 2);
        ctx.fillText(options.yLabel || 'Speedup', 0, 0); ctx.restore();
        // Ticks
        ctx.font = '10px monospace'; ctx.textAlign = 'center';
        for (let i = 0; i <= 4; i++) {
            ctx.fillText(Math.round(xMin + (xMax - xMin) / 4 * i), toX(xMin + (xMax - xMin) / 4 * i), h - pad.bottom + 14);
        }
        ctx.textAlign = 'right';
        for (let i = 0; i <= 4; i++) {
            const yv = yMin + (yMax - yMin) / 4 * i;
            ctx.fillText(yv.toFixed(1), pad.left - 6, toY(yv) + 3);
        }
    }

    // ==================== LITTLE'S LAW HEATMAP ====================
    function drawLittleHeatmap(canvasId, currentLambda, currentW) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        const w = rect.width, h = rect.height;
        const pad = { top: 20, right: 55, bottom: 35, left: 50 };
        const pw = w - pad.left - pad.right;
        const ph = h - pad.top - pad.bottom;
        ctx.clearRect(0, 0, w, h);
        const lambdaMin = 1, lambdaMax = 1000;
        const wMin = 0.001, wMax = 2.0;
        const cols = 80, rows = 40;
        const cellW = pw / cols, cellH = ph / rows;
        function lColor(L) {
            const t = Math.min(L / 200, 1);
            let r, g, b;
            if (t < 0.25) { const s = t / 0.25; r = 0; g = Math.floor(100 * s); b = Math.floor(180 - 80 * s); }
            else if (t < 0.5) { const s = (t - 0.25) / 0.25; r = 0; g = Math.floor(100 + 155 * s); b = Math.floor(100 - 100 * s); }
            else if (t < 0.75) { const s = (t - 0.5) / 0.25; r = Math.floor(255 * s); g = 255; b = 0; }
            else { const s = (t - 0.75) / 0.25; r = 255; g = Math.floor(255 - 255 * s); b = 0; }
            return `rgb(${r},${g},${b})`;
        }
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const lambda = lambdaMin + (lambdaMax - lambdaMin) * (col + 0.5) / cols;
                const wVal = wMax - (wMax - wMin) * (row + 0.5) / rows;
                ctx.fillStyle = lColor(lambda * wVal);
                ctx.fillRect(pad.left + col * cellW, pad.top + row * cellH, cellW + 0.5, cellH + 0.5);
            }
        }
        // Current point crosshair
        const cx = pad.left + (currentLambda - lambdaMin) / (lambdaMax - lambdaMin) * pw;
        const cy = pad.top + (1 - (currentW - wMin) / (wMax - wMin)) * ph;
        ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
        ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, pad.top + ph); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pad.left, cy); ctx.lineTo(pad.left + pw, cy); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'white'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        // L value label near cursor
        const L = currentLambda * currentW;
        ctx.fillStyle = 'white'; ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'left';
        const labelX = cx + 10 > pad.left + pw - 50 ? cx - 55 : cx + 10;
        const labelY = cy - 10 < pad.top + 10 ? cy + 16 : cy - 8;
        ctx.fillText(`L = ${L.toFixed(1)}`, labelX, labelY);
        // Axes
        ctx.fillStyle = '#999'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('Arrival rate \u03bb (req/s)', pad.left + pw / 2, h - 4);
        ctx.save(); ctx.translate(12, pad.top + ph / 2); ctx.rotate(-Math.PI / 2);
        ctx.fillText('Avg time W (s)', 0, 0); ctx.restore();
        // Ticks
        ctx.font = '10px monospace'; ctx.textAlign = 'center';
        for (let i = 0; i <= 4; i++) {
            ctx.fillText(Math.round(lambdaMin + (lambdaMax - lambdaMin) / 4 * i), pad.left + pw / 4 * i, h - pad.bottom + 14);
        }
        ctx.textAlign = 'right';
        for (let i = 0; i <= 4; i++) {
            const wv = wMax - (wMax - wMin) / 4 * i;
            ctx.fillText(wv.toFixed(2), pad.left - 6, pad.top + ph / 4 * i + 3);
        }
        // Color bar
        const cbX = w - pad.right + 8, cbW = 10;
        for (let i = 0; i < ph; i++) {
            ctx.fillStyle = lColor(200 * (1 - i / ph));
            ctx.fillRect(cbX, pad.top + i, cbW, 1);
        }
        ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
        ctx.strokeRect(cbX, pad.top, cbW, ph);
        ctx.fillStyle = '#999'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
        ctx.fillText('200+', cbX + cbW + 3, pad.top + 8);
        ctx.fillText('100', cbX + cbW + 3, pad.top + ph * 0.5 + 3);
        ctx.fillText('0', cbX + cbW + 3, pad.top + ph);
    }

    function updateQueueViz(L) {
        const container = document.getElementById('queue-dots');
        container.innerHTML = '';
        const maxDots = 100;
        const numDots = Math.min(Math.round(L), maxDots);
        const isOverflow = L > maxDots;
        for (let i = 0; i < numDots; i++) {
            const dot = document.createElement('div');
            dot.className = 'queue-dot' + (isOverflow && i >= numDots - 10 ? ' overflow' : '');
            container.appendChild(dot);
        }
        const countEl = document.getElementById('queue-count');
        if (L < 1) countEl.textContent = '< 1 item (system mostly idle)';
        else if (isOverflow) countEl.textContent = `\u2248${Math.round(L)} items (showing ${maxDots})`;
        else countEl.textContent = `${Math.round(L)} items in system`;
    }

    // ==================== SCALABILITY LAWS ====================
    async function updateAmdahl() {
        const f = parseFloat(document.getElementById('amdahl-f').value);
        const n = parseInt(document.getElementById('amdahl-n').value);
        document.getElementById('amdahl-f-val').textContent = f.toFixed(2);
        document.getElementById('amdahl-n-val').textContent = n;
        const res = await fetch(`/api/laws/amdahl?f=${f}&n=${n}`);
        const data = await res.json();
        drawLineChart('amdahl-chart', data.processors, data.speedup, {
            showLinear: true,
            hLine: data.theoretical_max,
            hLineLabel: `max: ${data.theoretical_max.toFixed(1)}`,
            yLabel: 'Speedup S(N)',
        });
        document.getElementById('amdahl-info').textContent =
            `Theoretical max speedup: ${data.theoretical_max.toFixed(2)}x (1/f). With ${n} processors: ${data.speedup[data.speedup.length-1].toFixed(2)}x`;
    }

    async function updateGustafson() {
        const f = parseFloat(document.getElementById('gustafson-f').value);
        const n = parseInt(document.getElementById('gustafson-n').value);
        document.getElementById('gustafson-f-val').textContent = f.toFixed(2);
        document.getElementById('gustafson-n-val').textContent = n;
        const [gRes, aRes] = await Promise.all([
            fetch(`/api/laws/gustafson?f=${f}&n=${n}`),
            fetch(`/api/laws/amdahl?f=${f}&n=${n}`)
        ]);
        const gData = await gRes.json();
        const aData = await aRes.json();
        drawComparisonChart('gustafson-chart', gData.processors, [
            { values: gData.scaled_speedup, color: '#0ea5e9', label: 'Gustafson' },
            { values: aData.speedup, color: '#e94560', label: 'Amdahl' },
        ], { showLinear: true, yLabel: 'Speedup S(N)' });
        const gFinal = gData.scaled_speedup[gData.scaled_speedup.length-1].toFixed(1);
        const aFinal = aData.speedup[aData.speedup.length-1].toFixed(1);
        document.getElementById('gustafson-info').innerHTML =
            `Gustafson: <b>${gFinal}x</b> vs Amdahl: <b>${aFinal}x</b> (ceiling ${(1/f).toFixed(1)}x) with ${n} processors. Gustafson scales the problem with N \u2014 no fixed ceiling.`;
    }

    async function updateUSL() {
        const sigma = parseFloat(document.getElementById('usl-sigma').value);
        const kappa = parseFloat(document.getElementById('usl-kappa').value);
        const n = parseInt(document.getElementById('usl-n').value);
        document.getElementById('usl-sigma-val').textContent = sigma.toFixed(3);
        document.getElementById('usl-kappa-val').textContent = kappa.toFixed(4);
        document.getElementById('usl-n-val').textContent = n;
        const res = await fetch(`/api/laws/usl?sigma=${sigma}&kappa=${kappa}&n=${n}`);
        const data = await res.json();
        drawLineChart('usl-chart', data.processors, data.throughput, {
            showLinear: true,
            yLabel: 'Throughput C(N)',
            peakX: data.peak_processors,
            peakY: data.peak_throughput,
        });
        document.getElementById('usl-info').textContent =
            `Peak throughput: ${data.peak_throughput.toFixed(1)}x at N=${data.peak_processors}. Beyond that, coherency overhead dominates.`;
    }

    async function updateLittle() {
        const lam = parseFloat(document.getElementById('little-lambda').value);
        const w = parseFloat(document.getElementById('little-w').value);
        document.getElementById('little-lambda-val').textContent = lam;
        document.getElementById('little-w-val').textContent = w.toFixed(3);
        const L = lam * w;
        // Heatmap: L across (λ, W) space
        drawLittleHeatmap('little-heatmap', lam, w);
        // Equation display
        document.getElementById('little-eq').innerHTML =
            `<div style="font-size:0.75rem;color:var(--text-dim)">L = \u03bb \u00d7 W</div>` +
            `<div class="result">${L.toFixed(1)}</div>` +
            `<div class="label">items in system</div>`;
        // Queue visualization
        updateQueueViz(L);
        // Practical interpretation
        let interp;
        if (L < 1) interp = 'System mostly idle \u2014 ample capacity.';
        else if (L < 10) interp = 'Light load \u2014 comfortable headroom.';
        else if (L < 50) interp = 'Moderate load \u2014 monitor latency trends.';
        else if (L < 200) interp = 'Heavy load \u2014 consider scaling or reducing W.';
        else interp = 'Very heavy \u2014 significant queuing delays expected.';
        document.getElementById('little-info').innerHTML =
            `<b>L = ${lam} \u00d7 ${w.toFixed(3)} = ${L.toFixed(1)}</b> \u2014 ${interp}`;
    }

    // Wire up sliders
    document.querySelectorAll('#amdahl-f, #amdahl-n').forEach(el => el.addEventListener('input', updateAmdahl));
    document.querySelectorAll('#gustafson-f, #gustafson-n').forEach(el => el.addEventListener('input', updateGustafson));
    document.querySelectorAll('#usl-sigma, #usl-kappa, #usl-n').forEach(el => el.addEventListener('input', updateUSL));
    document.querySelectorAll('#little-lambda, #little-w').forEach(el => el.addEventListener('input', updateLittle));

    // Initial draw
    window.addEventListener('load', () => {
        updateAmdahl(); updateGustafson(); updateUSL(); updateLittle();
    });
    window.addEventListener('resize', () => {
        updateAmdahl(); updateGustafson(); updateUSL(); updateLittle();
    });

    // ==================== LAMPORT CLOCKS ====================
    const PROCESS_COLORS = ['#0ea5e9', '#22c55e', '#eab308', '#e94560', '#a855f7'];

    function drawLamportDiagram(state) {
        const canvas = document.getElementById('lamport-canvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;

        const W = 700, H = 400;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(dpr, dpr);

        ctx.clearRect(0, 0, W, H);

        const procs = state.processes;
        const n = procs.length;
        if (n === 0) return;

        const pad = { top: 40, bottom: 30, left: 60, right: 30 };
        const colW = (W - pad.left - pad.right) / n;

        // Find max timestamp for Y scale
        let maxT = 1;
        for (const p of procs) {
            for (const e of p.events) {
                if (e.timestamp > maxT) maxT = e.timestamp;
            }
        }
        maxT = Math.max(maxT, 1);

        const toX = (pid) => pad.left + colW * pid + colW / 2;
        const toY = (t) => pad.top + (t / (maxT + 1)) * (H - pad.top - pad.bottom);

        // Draw process timelines (vertical lines)
        for (let i = 0; i < n; i++) {
            const x = toX(i);
            const color = procs[i].crashed ? '#ef4444' : PROCESS_COLORS[i % PROCESS_COLORS.length];

            // Vertical line
            ctx.strokeStyle = procs[i].crashed ? '#662222' : '#333';
            ctx.lineWidth = 2;
            ctx.setLineDash(procs[i].crashed ? [4, 4] : []);
            ctx.beginPath();
            ctx.moveTo(x, pad.top);
            ctx.lineTo(x, H - pad.bottom);
            ctx.stroke();
            ctx.setLineDash([]);

            // Process label
            ctx.fillStyle = color;
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(procs[i].name, x, pad.top - 10);
            if (procs[i].crashed) {
                ctx.fillStyle = '#ef4444';
                ctx.font = '10px sans-serif';
                ctx.fillText('CRASHED', x, pad.top - 22);
            }

            // Clock value
            ctx.fillStyle = '#e94560';
            ctx.font = '11px monospace';
            ctx.fillText(`t=${procs[i].clock}`, x, H - pad.bottom + 16);
        }

        // Draw messages (arrows between send and receive events)
        for (const msg of state.messages) {
            const sender = procs[msg.sender];
            const sendEvt = sender.events[msg.send_event_idx];
            const sx = toX(msg.sender);
            const sy = toY(sendEvt.timestamp);

            if (msg.delivered && msg.recv_event_idx != null) {
                const receiver = procs[msg.receiver];
                const recvEvt = receiver.events[msg.recv_event_idx];
                const rx = toX(msg.receiver);
                const ry = toY(recvEvt.timestamp);

                // Arrow line
                ctx.strokeStyle = '#eab308';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(rx, ry);
                ctx.stroke();

                // Arrowhead
                const angle = Math.atan2(ry - sy, rx - sx);
                ctx.fillStyle = '#eab308';
                ctx.beginPath();
                ctx.moveTo(rx, ry);
                ctx.lineTo(rx - 8 * Math.cos(angle - 0.4), ry - 8 * Math.sin(angle - 0.4));
                ctx.lineTo(rx - 8 * Math.cos(angle + 0.4), ry - 8 * Math.sin(angle + 0.4));
                ctx.closePath();
                ctx.fill();
            } else {
                // Undelivered — draw X
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 1.5;
                const mx = (sx + toX(msg.receiver)) / 2;
                const my = sy + 15;
                ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(mx, my); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(mx - 5, my - 5); ctx.lineTo(mx + 5, my + 5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(mx + 5, my - 5); ctx.lineTo(mx - 5, my + 5); ctx.stroke();
            }
        }

        // Draw events (dots on timelines)
        for (let i = 0; i < n; i++) {
            const x = toX(i);
            const color = PROCESS_COLORS[i % PROCESS_COLORS.length];
            for (const e of procs[i].events) {
                const y = toY(e.timestamp);

                // Dot
                ctx.fillStyle = e.type === 'internal' ? color : (e.type === 'send' ? '#eab308' : '#22c55e');
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();

                // Timestamp label
                ctx.fillStyle = '#eee';
                ctx.font = '10px monospace';
                ctx.textAlign = 'left';
                ctx.fillText(e.timestamp, x + 8, y + 3);

                // Event label
                if (e.label) {
                    ctx.fillStyle = '#999';
                    ctx.font = '9px sans-serif';
                    ctx.fillText(e.label, x + 22, y + 3);
                }
            }
        }
    }

    function updateProcessList(state) {
        const list = document.getElementById('process-list');
        list.innerHTML = '<h4 style="font-size:0.8rem;color:#999;margin-bottom:8px;">Processes</h4>';
        for (const p of state.processes) {
            const div = document.createElement('div');
            div.className = 'process-item' + (p.crashed ? ' crashed' : '');
            div.innerHTML = `
                <span class="name">${p.name}</span>
                <span class="clock">t=${p.clock}</span>
                <button onclick="lamportToggleCrash(${p.id})">${p.crashed ? 'Recover' : 'Crash'}</button>
            `;
            list.appendChild(div);
        }
    }

    async function lamportRefresh() {
        const res = await fetch('/api/lamport/state');
        const state = await res.json();
        drawLamportDiagram(state);
        updateProcessList(state);
        document.getElementById('step-info').textContent =
            `Step ${state.step_index} / ${state.total_steps}${state.done ? ' (done)' : ''}`;
        document.getElementById('btn-step').disabled = state.done;
        document.getElementById('btn-run').disabled = state.done;
    }

    async function lamportStep() {
        await fetch('/api/lamport/step', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
        lamportRefresh();
    }

    async function lamportRunAll() {
        await fetch('/api/lamport/run-all', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
        lamportRefresh();
    }

    async function lamportReset() {
        await fetch('/api/lamport/reset', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
        lamportRefresh();
    }

    async function lamportToggleCrash(pid) {
        const res = await fetch('/api/lamport/state');
        const state = await res.json();
        const proc = state.processes[pid];
        const endpoint = proc.crashed ? 'recover' : 'crash';
        await fetch(`/api/lamport/${endpoint}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ process_id: pid }),
        });
        lamportRefresh();
    }

    // Init Lamport on tab switch
    const origShowTab = showTab;
    showTab = function(name) {
        origShowTab(name);
        if (name === 'lamport') lamportRefresh();
    };
    </script>
